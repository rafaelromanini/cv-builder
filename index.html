<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
    <meta name="description" content="A modern, drag-and-drop CV builder with multiple templates, JSON import/export, PDF export and PT/EN UI. Built with React, TypeScript, Vite and Tailwind." />
    <meta name="author" content="Rafael Romanini" />
    <title>CV Builder — by Rafael Romanini</title>
    <script>
      // Apply the saved theme before React mounts to avoid a light/dark flash.
      (function () {
        try {
          var saved = localStorage.getItem('cv-builder-theme-v1');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : prefersDark ? 'dark' : 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
